# ===================== Application basics =====================
spring.application.name=linklingua-backend
server.port=8080

# ===================== Datasource (MySQL 8.0) =====================
# Note: adjust the database name, username and password for your environment
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/linklingua?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# HikariCP connection pool settings
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

# ===================== MyBatis =====================
# Location of Mapper XML files
mybatis.mapper-locations=classpath:mapper/*.xml
# Package for entity type aliases
mybatis.type-aliases-package=com.linklingua.entity
# Enable automatic camelCase mapping (DB user_name -> entity userName)
mybatis.configuration.map-underscore-to-camel-case=true
# Print SQL logs to the console (handy for debugging in development)
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# ===================== SpringDoc OpenAPI / Swagger =====================
# API docs JSON path
springdoc.api-docs.path=/v3/api-docs
# Swagger UI path: http://localhost:8080/swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html
# Sort operations alphabetically
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha

# ===================== JWT =====================
# HS256 requires a secret of at least 32 bytes. Override in production.
linklingua.jwt.secret=ca55a4bff90cf6a8b0b42da69317972b14aa02dd8d8c21ad955704a4126832b8
# Token time-to-live in milliseconds (default 2 hours)
linklingua.jwt.ttl=7200000
#linklingua.jwt.ttl=60000
# Request header that carries the token (a leading "Bearer " prefix is accepted)
linklingua.jwt.token-header=Authorization

# ===================== File upload =====================
# Local directory where uploaded files are stored (relative to the working dir)
linklingua.upload.dir=uploads
# Public URL prefix that maps to the upload directory (see WebMvcConfiguration)
linklingua.upload.url-prefix=/uploads/
# Allow larger image uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===================== Logging =====================
logging.level.com.linklingua=debug
